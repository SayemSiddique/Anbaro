name: Quality gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  workspace:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stock_dev
          POSTGRES_PASSWORD: stock_dev
          POSTGRES_DB: stock_management
          POSTGRES_APP_USER: stock_app
          POSTGRES_APP_PASSWORD: stock_app
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U stock_dev -d stock_management"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://stock_app:stock_app@localhost:5432/stock_management
      DATABASE_ADMIN_URL: postgresql://stock_dev:stock_dev@localhost:5432/stock_management
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-only-development-secret-that-is-at-least-32-characters
      PGPASSWORD: stock_dev
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @anbaro/contracts build && pnpm --filter @anbaro/design-tokens build
      - run: psql -h localhost -U stock_dev -d stock_management -f infra/postgres/init/001-create-app-role.sql
      - run: pnpm --filter @anbaro/api db:migrate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm format:check
      - run: pnpm exec prettier --check docs/api/openapi.v1.yaml

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          config-file: .github/dependency-review-config.yml

  api-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build the API container image
        run: docker build -f services/api/Dockerfile -t stock-api:${{ github.sha }} .
      - name: Boot check fails fast without required environment
        run: |
          set +e
          output=$(docker run --rm -e NODE_ENV=production stock-api:${{ github.sha }} 2>&1)
          status=$?
          set -e
          echo "$output"
          test $status -ne 0
          echo "$output" | grep -q "DATABASE_URL"
