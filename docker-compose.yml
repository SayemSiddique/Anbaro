services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stock_dev
      POSTGRES_PASSWORD: stock_dev
      POSTGRES_DB: stock_management
      POSTGRES_APP_USER: stock_app
      POSTGRES_APP_PASSWORD: stock_app
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stock_dev -d stock_management']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
