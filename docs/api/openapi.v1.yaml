          resolvedBy,
          resolvedAt,
          submissions,
        ]
      properties:
        id: { type: string, format: uuid }
        itemId: { type: string, format: uuid }
        itemName: { type: string }
        unit: { type: string }
        recordedQuantityBefore: { type: string, description: Immutable decimal snapshot. }
        currentRound: { type: integer, minimum: 1 }
        resolutionStatus: { type: string, enum: [pending, single_submission, conflict, accepted] }
        acceptedSubmissionId: { type: [string, 'null'], format: uuid }
        resolvedBy: { type: [string, 'null'], format: uuid }
        resolvedAt: { type: [string, 'null'], format: date-time }
        submissions: { type: array, items: { $ref: '#/components/schemas/CountSubmission' } }
    CountSessionSummary:
      type: object
      required:
        [
          id,
          locationId,
          locationName,
          status,
          startedBy,
          startedByName,
          startedAt,
          finalizedBy,
          finalizedAt,
          lineCount,
          pendingCount,
          conflictCount,
          acceptedCount,
        ]
      properties:
        id: { type: string, format: uuid }
        locationId: { type: string, format: uuid }
        locationName: { type: string }
        status: { type: string, enum: [in_progress, finalized, abandoned] }
        startedBy: { type: string, format: uuid }
        startedByName: { type: string }
        startedAt: { type: string, format: date-time }
        finalizedBy: { type: [string, 'null'], format: uuid }
        finalizedAt: { type: [string, 'null'], format: date-time }
        lineCount: { type: integer }
        pendingCount: { type: integer }
        conflictCount: { type: integer }
        acceptedCount: { type: integer }
    CountSession:
      allOf:
        - { $ref: '#/components/schemas/CountSessionSummary' }
