        name: { type: string }
        unit: { type: string }
        barcodeIdentifier: { type: [string, 'null'] }
        status: { type: string, enum: [active, archived] }
        quantity:
          { type: [string, 'null'], description: Decimal string when location stock is requested. }
        threshold:
          { type: [string, 'null'], description: Decimal string when location stock is requested. }
        parLevel:
          {
            type: [string, 'null'],
            description: Decimal string when set and location stock is requested.,
