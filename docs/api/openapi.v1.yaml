      properties:
        data:
          type: object
          required: [id, status, summary, rows, createdAt]
          properties:
            id: { type: string, format: uuid }
            filename: { type: [string, 'null'] }
            status: { type: string, enum: [validating, preview, committed, failed] }
            summary:
              type: object
              required: [rows, valid, errors, created, updated, skipped]
              properties:
                rows: { type: integer }
                valid: { type: integer }
                errors: { type: integer }
                created: { type: integer }
                updated: { type: integer }
                skipped: { type: integer }
            failureReason: { type: [string, 'null'] }
            createdAt: { type: string, format: date-time }
            committedAt: { type: [string, 'null'], format: date-time }
            rows: { type: array, items: { $ref: '#/components/schemas/ImportRow' } }
    Supplier:
      type: object
      required: [id, name, contactEmail, contactPhone]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        contactEmail: { type: [string, 'null'], format: email }
        contactPhone: { type: [string, 'null'] }
        itemCount: { type: integer }
    SupplierRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 160 }
        contactEmail: { type: [string, 'null'], format: email }
        contactPhone: { type: [string, 'null'], maxLength: 50 }
    SupplierUpdateRequest:
      allOf: [{ $ref: '#/components/schemas/SupplierRequest' }]
      minProperties: 1
    SupplierResponse:
      type: object
      required: [data]
      properties: { data: { $ref: '#/components/schemas/Supplier' } }
    SupplierListResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Supplier' } }
        meta: { type: object, properties: { nextCursor: { type: 'null' } } }
    SupplierMapping:
      type: object
      required: [id, itemId, supplierId, supplierSku, isPrimary]
      properties:
        id: { type: string, format: uuid }
        itemId: { type: string, format: uuid }
        supplierId: { type: string, format: uuid }
        supplierName: { type: string }
        supplierSku: { type: [string, 'null'] }
        isPrimary: { type: boolean }
    SupplierMappingRequest:
      type: object
      additionalProperties: false
      required: [supplierId]
      properties:
        supplierId: { type: string, format: uuid }
        supplierSku: { type: [string, 'null'], maxLength: 100 }
        isPrimary: { type: boolean, default: false }
    SupplierMappingResponse:
      type: object
      required: [data]
      properties: { data: { $ref: '#/components/schemas/SupplierMapping' } }
    SupplierMappingListResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/SupplierMapping' } }
        meta: { type: object, properties: { nextCursor: { type: 'null' } } }
    StockLevelsRequest:
      type: object
      additionalProperties: false
      required: [locationId, threshold, parLevel]
      properties:
        locationId: { type: string, format: uuid }
        threshold: { type: number, minimum: 0 }
        parLevel: { type: [number, 'null'], minimum: 0 }
    StockLevelsResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          properties:
            quantity: { type: string }
            threshold: { type: string }
            parLevel: { type: [string, 'null'] }
            lastEventId: { type: [string, 'null'], format: uuid }
            lastUpdatedAt: { type: string, format: date-time }
    NotificationPreference:
      type: object
      required: [channel, enabled]
      properties:
        channel: { type: string, enum: [in_app, email, push] }
        enabled: { type: boolean }
    NotificationPreferenceRequest:
      allOf: [{ $ref: '#/components/schemas/NotificationPreference' }]
    NotificationPreferenceResponse:
      type: object
      required: [data]
      properties: { data: { $ref: '#/components/schemas/NotificationPreference' } }
    NotificationPreferenceListResponse:
      type: object
      required: [data]
      properties:
        { data: { type: array, items: { $ref: '#/components/schemas/NotificationPreference' } } }
    Notification:
      type: object
      required:
        [id, type, title, body, locationId, locationName, itemId, itemName, readAt, createdAt]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [low_stock] }
        title: { type: string }
        body: { type: string }
        locationId: { type: string, format: uuid }
        locationName: { type: string }
        itemId: { type: string, format: uuid }
        itemName: { type: string }
        readAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    NotificationListResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Notification' } }
        meta: { type: object, properties: { nextCursor: { type: 'null' } } }
    ReorderSuggestion:
      type: object
      required:
        [
          id,
          locationId,
          locationName,
          itemId,
          itemName,
          unit,
          suggestedQuantity,
          basis,
          status,
          generatedAt,
          reviewedBy,
          reviewedAt,
          primarySupplierName,
        ]
      properties:
        id: { type: string, format: uuid }
        locationId: { type: string, format: uuid }
        locationName: { type: string }
        itemId: { type: string, format: uuid }
        itemName: { type: string }
        unit: { type: string }
        suggestedQuantity:
          { type: string, description: max(parLevel - quantity, 0) at evaluation time }
        basis: { type: string, enum: [par_level] }
        status: { type: string, enum: [pending, reviewed_sent, dismissed] }
        generatedAt: { type: string, format: date-time }
        reviewedBy: { type: [string, 'null'], format: uuid }
        reviewedAt: { type: [string, 'null'], format: date-time }
        primarySupplierName: { type: [string, 'null'] }
    ReorderSuggestionListResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/ReorderSuggestion' } }
        meta: { type: object, properties: { nextCursor: { type: 'null' } } }
    ReorderReviewRequest:
      type: object
      additionalProperties: false
      required: [action]
      properties: { action: { type: string, enum: [reviewed_sent, dismissed] } }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code: { type: string, example: AUTH_REQUIRED }
            message: { type: string }
            details: { type: object, additionalProperties: true }
  responses:
    ValidationError:
      description: Request validation failed
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    AuthRequired:
      description: Missing, malformed, expired, or revoked access token
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    InvalidCredentials:
      description: Credentials were not accepted
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    InvalidSession:
      description: Refresh session is expired, revoked, or replayed
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    EmailAlreadyRegistered:
      description: Email is already registered
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ActiveMembershipRequired:
      description: User has no active membership in the requested organization
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    PermissionDenied:
      description: Active membership lacks the required grant
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    WriteUnavailable:
      description: Subscription is read-only or cannot accept writes.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    LocationCapacityReached:
      description: All entitled active locations are in use; no row was created.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    LocationNotFound:
      description: The location is outside the verified organization or already archived.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    CategoryNotFound:
      description: The category is outside the verified organization or archived.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    CategoryNameAlreadyExists:
      description: An active or archived category already uses the requested name in this organization.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ItemNotFound:
      description: The item is outside the verified organization or archived.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ItemBarcodeNotFound:
      description: No active item in the verified organization uses this barcode.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ItemBarcodeAlreadyExists:
      description: Another item in the verified organization already uses this barcode.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ImportNotFound:
      description: Import is outside the verified organization or does not exist.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ImportNotReady:
      description: Validation must complete before the import can be committed.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    OwnerExportRequired:
      description: Only the active Owner grant set may export organization data.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    CountSessionNotFound:
      description: Count session is outside the verified organization or does not exist.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    CountSessionConflict:
      description: A count is already active at the location or the location has no active item snapshot.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    CountSubmissionConflict:
      description: The server session, line, round, accepted submission, or idempotency state conflicts with this write. The client must retain and surface its local value.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    RateLimited:
      description: Rate limit exceeded
      headers: { Retry-After: { schema: { type: integer } } }
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
