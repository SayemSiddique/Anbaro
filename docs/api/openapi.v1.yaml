            id: { type: string, format: uuid }
            status: { type: string, enum: [validating, preview, committed, failed] }
            uploadUrl: { type: [string, 'null'] }
            uploadToken: { type: string, readOnly: true }
            expiresIn: { type: integer, readOnly: true }
    ImportRow:
      type: object
