        itemId: { type: string, format: uuid }
        locationId: { type: string, format: uuid }
        eventType: { type: string, enum: [adjustment, loss] }
        quantityDelta:
          { type: number, minimum: -99999999999.999, maximum: 99999999999.999, not: { const: 0 } }
        reasonCode: { type: string, minLength: 1, maxLength: 64, description: Required for loss. }
    StockEvent:
      type: object
      required:
        [
          id,
          itemId,
          locationId,
          eventType,
          quantityDelta,
          resultingQuantity,
          reasonCode,
          source,
          actorUserId,
          createdAt,
        ]
      properties:
        id: { type: string, format: uuid }
        itemId: { type: string, format: uuid }
        locationId: { type: string, format: uuid }
        locationName: { type: string }
        eventType:
          { type: string, enum: [initial, purchase, loss, adjustment, count_reconciliation] }
        quantityDelta: { type: string, description: Decimal string. }
        resultingQuantity: { type: string, description: Decimal string. }
        reasonCode: { type: [string, 'null'] }
        source: { type: string, enum: [manual, barcode, csv_import, count_session, system] }
        actorUserId: { type: string, format: uuid }
        actorName: { type: string }
        createdAt: { type: string, format: date-time }
    StockEventResponse:
