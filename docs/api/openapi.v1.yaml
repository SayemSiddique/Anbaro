      properties: { locationId: { type: string, format: uuid } }
    CreateCountSubmissionRequest:
      type: object
      additionalProperties: false
      required: [roundNumber, quantity, idempotencyKey, clientCreatedAt]
      properties:
        roundNumber: { type: integer, minimum: 1 }
        quantity: { type: number, minimum: 0, maximum: 99999999999.999 }
        idempotencyKey: { type: string, format: uuid }
        clientCreatedAt: { type: string, format: date-time }
    AcceptCountRequest:
      type: object
      additionalProperties: false
      required: [submissionId]
      properties: { submissionId: { type: string, format: uuid } }
    FinalizeCountRequest:
      type: object
      additionalProperties: false
      required: [idempotencyKey]
      properties: { idempotencyKey: { type: string, format: uuid } }
    CountSubmission:
      type: object
      required:
        [
          id,
          roundNumber,
          quantity,
          submittedBy,
          submittedByName,
          submittedAt,
          clientCreatedAt,
          source,
          idempotencyKey,
        ]
      properties:
        id: { type: string, format: uuid }
        roundNumber: { type: integer }
        quantity: { type: string, description: Decimal string. }
        submittedBy: { type: string, format: uuid }
        submittedByName: { type: string }
        submittedAt: { type: string, format: date-time }
        clientCreatedAt: { type: [string, 'null'], format: date-time }
        source: { type: string, enum: [count_session] }
        idempotencyKey: { type: string, format: uuid }
    CountSessionLine:
      type: object
      required:
        [
          id,
          itemId,
          itemName,
