openapi: 3.1.0
info:
  title: Anbaro API
  version: 1.0.0
  description: |
    Contract for onboarding, catalog, immutable stock movements,
    guided count reconciliation, suppliers, low-stock notifications, and human-reviewed reorder recommendations.
    Protected tenant endpoints derive the
    active organization from the access token and verified membership; no request
    may make a client-supplied organization ID authoritative.
servers:
  - url: http://localhost:3001/api/v1
    description: Local development
tags:
  - name: Auth
  - name: Current user
  - name: Organizations
  - name: Locations
  - name: Categories
  - name: Items
  - name: Stock events
  - name: Counts
  - name: Imports
  - name: Exports
  - name: Suppliers
  - name: Notifications
  - name: Reorder suggestions
  - name: Reports
  - name: Team administration
  - name: Settings
  - name: Billing
  - name: Stripe webhooks
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a credential-only user account
      description: Creates the user credential only. The caller creates or joins an organization in a separate step.
      security: []
      x-rate-limit: per IP, 5 requests per hour
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Account and session created
          headers: { Set-Cookie: { $ref: '#/components/headers/RefreshCookie' } }
          content: { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/EmailAlreadyRegistered' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and start a session
      security: []
      x-rate-limit: per IP, 10 requests per minute
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated session
          headers: { Set-Cookie: { $ref: '#/components/headers/RefreshCookie' } }
          content: { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/InvalidCredentials' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate an opaque refresh token
      description: |
        Web clients use the HttpOnly cookie. Mobile clients send `refreshToken` in
        the JSON body and receive its rotated replacement in the response. Reuse
        of a rotated token revokes its entire session family.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: Rotated session
          headers: { Set-Cookie: { $ref: '#/components/headers/RefreshCookie' } }
          content:
            { application/json: { schema: { $ref: '#/components/schemas/RefreshResponse' } } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/InvalidSession' }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the presented refresh session
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '204': { description: Session revoked and browser cookie cleared }
        '400': { $ref: '#/components/responses/ValidationError' }
  /me:
    get:
      tags: [Current user]
      summary: Read the authenticated user and current active organization ID
      x-rate-limit: per verified user, 300 requests per minute
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current user
          content: { application/json: { schema: { $ref: '#/components/schemas/MeResponse' } } }
        '401': { $ref: '#/components/responses/AuthRequired' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /me/active-organization:
    post:
      tags: [Current user]
      summary: Select an organization in which the user has an active membership
      x-rate-limit: per verified user, 300 requests per minute
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SelectOrganizationRequest' }
      responses:
        '200':
          description: New active organization and access token
          content:
            {
              application/json:
                { schema: { $ref: '#/components/schemas/SelectOrganizationResponse' } },
            }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/AuthRequired' }
        '403': { $ref: '#/components/responses/ActiveMembershipRequired' }
    get:
      tags: [Current user]
      summary: Read the active organization through verified tenant context
      description: Requires the centrally resolved `organization:read` permission.
      x-rate-limit: per verified user, 300 requests per minute
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Active organization
          content:
            { application/json: { schema: { $ref: '#/components/schemas/OrganizationResponse' } } }
        '401': { $ref: '#/components/responses/AuthRequired' }
        '403': { $ref: '#/components/responses/PermissionDenied' }
    patch:
      tags: [Organizations]
      summary: Rename the verified active organization
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: '#/components/schemas/CreateOrganizationRequest' } },
          }
      responses:
        '200':
          {
            description: Updated organization,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/OrganizationResponse' } },
              },
          }
        '401': { $ref: '#/components/responses/AuthRequired' }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
  /organizations:
    get:
      tags: [Organizations]
      summary: List the caller's verified active memberships
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Memberships,
            content:
              {
                application/json:
                  { schema: { $ref: '#/components/schemas/MembershipListResponse' } },
              },
          }
        '401': { $ref: '#/components/responses/AuthRequired' }
    post:
      tags: [Organizations]
      summary: Create an organization, owner membership, 30-day trial, and four-location entitlement
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          {
            application/json:
              { schema: { $ref: '#/components/schemas/CreateOrganizationRequest' } },
          }
      responses:
        '201':
          {
            description: Organization created and selected,
            content:
              {
                application/json:
                  { schema: { $ref: '#/components/schemas/CreateOrganizationResponse' } },
              },
          }
        '401': { $ref: '#/components/responses/AuthRequired' }
  /locations:
    get:
      tags: [Locations]
      summary: List active locations in the verified active organization
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Active locations and capacity,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/LocationListResponse' } },
              },
          }
        '401': { $ref: '#/components/responses/AuthRequired' }
        '403': { $ref: '#/components/responses/PermissionDenied' }
    post:
      tags: [Locations]
      summary: Create a location after subscription and capacity prechecks
      description: A capacity failure never creates a location and returns enough data for clients to preserve the local draft. Resolve additional capacity through the billing Checkout endpoints.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/LocationRequest' } } }
      responses:
        '201':
          {
            description: Location created,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/LocationResponse' } } },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '409': { $ref: '#/components/responses/LocationCapacityReached' }
  /locations/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    patch:
      tags: [Locations]
      summary: Edit a location in the verified active organization
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          { application/json: { schema: { $ref: '#/components/schemas/LocationUpdateRequest' } } }
      responses:
        '200':
          {
            description: Location updated,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/LocationResponse' } } },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '404': { $ref: '#/components/responses/LocationNotFound' }
    delete:
      tags: [Locations]
      summary: Archive a location; historical rows remain intact
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Location archived }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '404': { $ref: '#/components/responses/LocationNotFound' }
  /categories:
    get:
      tags: [Categories]
      summary: List active categories in the verified active organization
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Categories,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/CategoryListResponse' } },
              },
          }
        '403': { $ref: '#/components/responses/PermissionDenied' }
    post:
      tags: [Categories]
      summary: Create a category in the verified active organization
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/CategoryRequest' } } },
        }
      responses:
        '201':
          {
            description: Category created,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/CategoryResponse' } } },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '409': { $ref: '#/components/responses/CategoryNameAlreadyExists' }
  /categories/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Categories]
      summary: Read a category through verified tenant context
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Category,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/CategoryResponse' } } },
          }
        '404': { $ref: '#/components/responses/CategoryNotFound' }
    patch:
      tags: [Categories]
      summary: Edit an active category
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json: { schema: { $ref: '#/components/schemas/CategoryUpdateRequest' } },
            },
        }
      responses:
        '200':
          {
            description: Category updated,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/CategoryResponse' } } },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '404': { $ref: '#/components/responses/CategoryNotFound' }
    delete:
      tags: [Categories]
      summary: Archive a category; items and history remain intact
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Category archived }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '404': { $ref: '#/components/responses/CategoryNotFound' }
  /items:
    get:
      tags: [Items]
      summary: List active items with an optional active-location stock projection
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: locationId, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: categoryId, in: query, required: false, schema: { type: string, format: uuid } }
        - {
            name: search,
            in: query,
            required: false,
            schema: { type: string, minLength: 1, maxLength: 160 },
          }
      responses:
        '200':
          {
            description: Items,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/ItemListResponse' } } },
          }
        '404': { $ref: '#/components/responses/LocationNotFound' }
    post:
      tags: [Items]
      summary: Create an item and zero-quantity projections for active locations
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content: { application/json: { schema: { $ref: '#/components/schemas/ItemRequest' } } },
        }
      responses:
        '201':
          {
            description: Item created,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/ItemResponse' } } },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '404': { $ref: '#/components/responses/CategoryNotFound' }
        '409': { $ref: '#/components/responses/ItemBarcodeAlreadyExists' }
  /items/barcode/{barcode}:
    parameters:
      [
        {
          name: barcode,
          in: path,
          required: true,
          schema: { type: string, minLength: 1, maxLength: 255 },
        },
      ]
    get:
      tags: [Items]
      summary: Look up an organization-unique barcode
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Matched item,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/ItemResponse' } } },
          }
        '404': { $ref: '#/components/responses/ItemBarcodeNotFound' }
  /items/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Items]
      summary: Read an item without a location projection
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Item,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/ItemResponse' } } },
          }
        '404': { $ref: '#/components/responses/ItemNotFound' }
    patch:
      tags: [Items]
      summary: Edit an active item
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/ItemUpdateRequest' } } },
        }
      responses:
        '200':
          {
            description: Item updated,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/ItemResponse' } } },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '404': { $ref: '#/components/responses/ItemNotFound' }
        '409': { $ref: '#/components/responses/ItemBarcodeAlreadyExists' }
    delete:
      tags: [Items]
      summary: Archive an item; projections and immutable history remain intact
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Item archived }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '404': { $ref: '#/components/responses/ItemNotFound' }
  /items/{id}/location-stock:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: locationId, in: query, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Items]
      summary: Read one item’s rebuildable stock projection at an active location
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Item and location stock,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/ItemResponse' } } },
          }
        '404': { $ref: '#/components/responses/ItemNotFound' }
  /items/{id}/stock-events:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: locationId, in: query, required: false, schema: { type: string, format: uuid } }
      - {
          name: limit,
          in: query,
          required: false,
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 },
        }
    get:
      tags: [Stock events]
      summary: List immutable attributed stock-event history for an item
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Stock-event history,
            content:
              {
                application/json:
                  { schema: { $ref: '#/components/schemas/StockEventListResponse' } },
              },
          }
        '404': { $ref: '#/components/responses/ItemNotFound' }
  /stock-events:
    post:
      tags: [Stock events]
      summary: Append a manual adjustment or loss and atomically update location stock
      description: The server derives the resulting quantity under a projection row lock. Losses require a negative delta and a reason code. No endpoint edits stock events or location stock directly.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: '#/components/schemas/CreateStockEventRequest' } },
            },
        }
      responses:
        '201':
          {
            description: Immutable stock event created,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/StockEventResponse' } } },
          }
        '400': { $ref: '#/components/responses/ValidationError' }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '404': { $ref: '#/components/responses/ItemNotFound' }
  /count-sessions:
    get:
      tags: [Counts]
      summary: List count sessions in the verified active organization
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: locationId, in: query, required: false, schema: { type: string, format: uuid } }
        - {
            name: status,
            in: query,
            required: false,
            schema: { type: string, enum: [in_progress, finalized, abandoned] },
          }
      responses:
        '200':
          {
            description: Count sessions,
            content:
              {
                application/json:
                  { schema: { $ref: '#/components/schemas/CountSessionListResponse' } },
              },
          }
        '403': { $ref: '#/components/responses/PermissionDenied' }
    post:
      tags: [Counts]
      summary: Start one count with an immutable snapshot of all active item/location quantities
      description: A location can have at most one in-progress session. If one exists, the conflict response includes its ID so the client can join it.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/StartCountRequest' } } },
        }
      responses:
        '201':
          {
            description: Count session and snapshot lines created,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/CountSessionResponse' } },
              },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '409': { $ref: '#/components/responses/CountSessionConflict' }
  /count-sessions/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Counts]
      summary: Read a count, immutable snapshot lines, and all submission rounds
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Count session,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/CountSessionResponse' } },
              },
          }
        '404': { $ref: '#/components/responses/CountSessionNotFound' }
  /count-sessions/{id}/lines/{lineId}/submissions:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: lineId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Counts]
      summary: Append an immutable, idempotent count submission for the current round
      description: Replaying the same key and payload returns the original server state. A stale round, accepted line, or closed session returns a visible 409 conflict and never drops the local value.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: '#/components/schemas/CreateCountSubmissionRequest' } },
            },
        }
      responses:
        '201':
          {
            description: Submission appended or idempotently replayed,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/CountSessionResponse' } },
              },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '409': { $ref: '#/components/responses/CountSubmissionConflict' }
  /count-sessions/{id}/lines/{lineId}/accept:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: lineId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Counts]
      summary: Accept one immutable submission from the line's current round
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/AcceptCountRequest' } } },
        }
      responses:
        '200':
          {
            description: Line accepted; stock is not finalized until the count session is finalized,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/CountSessionResponse' } },
              },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '409': { $ref: '#/components/responses/CountSubmissionConflict' }
  /count-sessions/{id}/lines/{lineId}/recount:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: lineId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Counts]
      summary: Begin the next round without deleting earlier submissions
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: New pending round,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/CountSessionResponse' } },
              },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '409': { $ref: '#/components/responses/CountSubmissionConflict' }
  /count-sessions/{id}/finalize:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Counts]
      summary: Atomically reconcile every accepted line and terminally finalize a count
      description: |
        Requires `count:finalize`. The server locks the in-progress session and each current
        projection, rejects any unresolved line, appends exactly one attributed
        `count_reconciliation` event per accepted line, and updates projections in the same
        transaction. An accepted count equal to the locked current projection still appends a
        zero-delta reconciliation event so the completed physical count is auditable. Replaying
        the same key by the same finalizer returns the finalized session without duplicate events.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FinalizeCountRequest' }
      responses:
        '200':
          description: Terminal finalized count with immutable history retained
          content:
            application/json: { schema: { $ref: '#/components/schemas/CountSessionResponse' } }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '409': { $ref: '#/components/responses/CountSubmissionConflict' }
  /suppliers:
    get:
      tags: [Suppliers]
      summary: List verified-tenant suppliers
      description: Requires `supplier:manage`.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Supplier list,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/SupplierListResponse' } },
              },
          }
        '403': { $ref: '#/components/responses/PermissionDenied' }
    post:
      tags: [Suppliers]
      summary: Create supplier reference data
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/SupplierRequest' } } },
        }
      responses:
        '201':
          {
            description: Supplier created,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/SupplierResponse' } } },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
  /suppliers/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    patch:
      tags: [Suppliers]
      summary: Update supplier reference data
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json: { schema: { $ref: '#/components/schemas/SupplierUpdateRequest' } },
            },
        }
      responses:
        {
          '200':
            {
              description: Supplier updated,
              content:
                { application/json: { schema: { $ref: '#/components/schemas/SupplierResponse' } } },
            },
        }
    delete:
      tags: [Suppliers]
      summary: Delete an unmapped supplier
      security: [{ bearerAuth: [] }]
      responses:
        {
          '204': { description: Supplier deleted },
          '409': { description: Supplier still has item mappings },
        }
  /items/{itemId}/suppliers:
    parameters: [{ name: itemId, in: path, required: true, schema: { type: string, format: uuid } }]
    get:
      tags: [Suppliers]
      summary: List supplier mappings for an item
      security: [{ bearerAuth: [] }]
      responses:
        {
          '200':
            {
              description: Mappings,
              content:
                {
                  application/json:
                    { schema: { $ref: '#/components/schemas/SupplierMappingListResponse' } },
                },
            },
        }
    post:
      tags: [Suppliers]
      summary: Create an item-supplier mapping
      description: A primary mapping atomically clears any former primary mapping for this item.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json: { schema: { $ref: '#/components/schemas/SupplierMappingRequest' } },
            },
        }
      responses:
        {
          '201':
            {
              description: Mapping created,
              content:
                {
                  application/json:
                    { schema: { $ref: '#/components/schemas/SupplierMappingResponse' } },
                },
            },
        }
  /items/{itemId}/suppliers/{mappingId}:
    parameters:
      - { name: itemId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: mappingId, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      tags: [Suppliers]
      summary: Remove an item-supplier mapping
      security: [{ bearerAuth: [] }]
      responses: { '204': { description: Mapping removed } }
  /items/{itemId}/location-stock/levels:
    parameters: [{ name: itemId, in: path, required: true, schema: { type: string, format: uuid } }]
    put:
      tags: [Stock events]
      summary: Save location threshold and target stock level through the server-owned path
      description: Requires `stock:write`; this endpoint never edits a stock quantity.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/StockLevelsRequest' } } },
        }
      responses:
        {
          '200':
            {
              description: Levels saved,
              content:
                {
                  application/json:
                    { schema: { $ref: '#/components/schemas/StockLevelsResponse' } },
                },
            },
          '403': { $ref: '#/components/responses/WriteUnavailable' },
        }
  /notification-preferences:
    get:
      tags: [Notifications]
      summary: Read the active user’s low-stock channel preferences
      security: [{ bearerAuth: [] }]
      responses:
        {
          '200':
            {
              description: Preferences,
              content:
                {
                  application/json:
                    { schema: { $ref: '#/components/schemas/NotificationPreferenceListResponse' } },
                },
            },
        }
    put:
      tags: [Notifications]
      summary: Update one self-service low-stock channel preference
      description: Only in-app, email, and push are valid channels; SMS is unsupported.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: '#/components/schemas/NotificationPreferenceRequest' } },
            },
        }
      responses:
        {
          '200':
            {
              description: Preference saved,
              content:
                {
                  application/json:
                    { schema: { $ref: '#/components/schemas/NotificationPreferenceResponse' } },
                },
            },
        }
  /notifications:
    get:
      tags: [Notifications]
      summary: List the active user’s in-app low-stock alerts
      security: [{ bearerAuth: [] }]
      parameters: [{ name: unreadOnly, in: query, schema: { type: boolean } }]
      responses:
        {
          '200':
            {
              description: Alerts,
              content:
                {
                  application/json:
                    { schema: { $ref: '#/components/schemas/NotificationListResponse' } },
                },
            },
        }
  /notifications/{id}/read:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    post:
      tags: [Notifications]
      summary: Mark one owned alert read
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Alert marked read } }
  /reorder-suggestions:
    get:
      tags: [Reorder suggestions]
      summary: List human-reviewed reorder recommendations
      description: Requires `supplier:manage`. Suggestions are `max(parLevel - quantity, 0)` recommendations and never purchase orders.
      security: [{ bearerAuth: [] }]
      responses:
        {
          '200':
            {
              description: Suggestions,
              content:
                {
                  application/json:
                    { schema: { $ref: '#/components/schemas/ReorderSuggestionListResponse' } },
                },
            },
        }
  /reorder-suggestions/{id}/review:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    post:
      tags: [Reorder suggestions]
      summary: Mark a pending recommendation reviewed/sent or dismissed
      description: This records a human action only; no purchase order is created or dispatched.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/ReorderReviewRequest' } } },
        }
      responses:
        {
          '200': { description: Recommendation reviewed },
          '409': { description: Recommendation is no longer pending },
        }
  /imports/template:
    get:
      tags: [Imports]
      summary: Download the supported item CSV template
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: CSV template, content: { text/csv: { schema: { type: string } } } }
        '403': { $ref: '#/components/responses/PermissionDenied' }
  /imports:
    post:
      tags: [Imports]
      summary: Initialize an idempotent private CSV upload
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/ImportInitRequest' } } },
        }
      responses:
        '201':
          {
            description: Private upload initialized,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/ImportInitResponse' } } },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
  /imports/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Imports]
      summary: Read validation preview or committed import outcome
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Import batch,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/ImportBatchResponse' } },
              },
          }
        '404': { $ref: '#/components/responses/ImportNotFound' }
  /imports/{id}/upload:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    put:
      tags: [Imports]
      summary: Upload CSV content to its authenticated private batch URL and queue validation
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/ImportUploadRequest' } } },
        }
      responses:
        '200': { description: Validation queued }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '404': { $ref: '#/components/responses/ImportNotFound' }
  /imports/{id}/commit:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      tags: [Imports]
      summary: Commit only validated rows; retries do not duplicate catalog or ledger writes
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Customer-visible import outcome,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/ImportBatchResponse' } },
              },
          }
        '403': { $ref: '#/components/responses/WriteUnavailable' }
        '409': { $ref: '#/components/responses/ImportNotReady' }
  /imports/{id}/error-report:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Imports]
      summary: Download a customer-readable CSV report for skipped rows
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          { description: CSV error report, content: { text/csv: { schema: { type: string } } } }
  /exports/organization:
    get:
      tags: [Exports]
      summary: Owner-only organization data export
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: CSV export of item,
            projection,
            and immutable stock history rows,
            content: { text/csv: { schema: { type: string } } },
          }
        '403': { $ref: '#/components/responses/OwnerExportRequired' }
  /reports/dashboard:
    get:
      tags: [Reports]
      summary: Read a cross-location operational rollup
      description: Every aggregate low-stock row carries its location; the endpoint reads projections and count state only.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Location cards and low-stock rows,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/DashboardResponse' } } },
          }
        '403': { $ref: '#/components/responses/PermissionDenied' }
  /reports/loss-by-reason:
    get:
      tags: [Reports]
      summary: Aggregate immutable loss events by reason
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: locationId, in: query, schema: { type: string, format: uuid } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses:
        '200':
          {
            description: Loss totals,
            content:
              {
                application/json: { schema: { $ref: '#/components/schemas/LossByReasonResponse' } },
              },
          }
  /reports/activity:
    get:
      tags: [Reports]
      summary: Read immutable stock/count activity and append-only administration audit records
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Latest activity,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/ActivityResponse' } } },
          }
        '403': { $ref: '#/components/responses/PermissionDenied' }
  /memberships:
    get:
      tags: [Team administration]
      summary: List organization memberships
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Team membership list,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/MembershipList' } } },
          }

  /memberships/{id}:
    patch:
      tags: [Team administration]
      summary: Change a member grant set or revoke an active membership
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: '#/components/schemas/MembershipUpdateRequest' } },
            },
        }
      responses:
        '200': { description: Membership changed }
        '403': { $ref: '#/components/responses/PermissionDenied' }
        '409': { description: Self or last Owner changes are rejected }
  /membership-invitations:
    get:
      tags: [Team administration]
      summary: List invitations
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Invitations } }
    post:
      tags: [Team administration]
      summary: Create a seven-day, token-hash-backed invitation
      description: The one-time acceptance token is returned for the delivery adapter; no client-supplied organization ID is accepted.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/InvitationRequest' } } },
        }
      responses:
        '201': { description: Invitation created }
        '403': { $ref: '#/components/responses/PermissionDenied' }
        '409': { description: A pending invitation or membership already exists }
  /invitations/accept:
    post:
      tags: [Auth]
      summary: Accept an invitation, create a credential, and activate membership
      security: []
      x-rate-limit: per IP, 5 requests per hour
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: '#/components/schemas/InvitationAcceptanceRequest' } },
            },
        }
      responses:
        '201':
          {
            description: Account,
            authenticated session,
            and active organization created,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/AuthResponse' } } },
          }
        '400': { description: Invitation is invalid, expired, or already accepted }
  /permission-grant-sets:
    get:
      tags: [Team administration]
      summary: List preset and organization custom grant sets
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: Grant sets } }
    post:
      tags: [Team administration]
      summary: Create an organization custom grant set
      description: Requires both user:manage and owner-only grant:manage; grant:manage itself cannot be delegated through a custom set.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json: { schema: { $ref: '#/components/schemas/CustomGrantSetRequest' } },
            },
        }
      responses:
        {
          '201': { description: Custom grant set created },
          '403': { $ref: '#/components/responses/PermissionDenied' },
        }
  /permission-grant-sets/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
    patch:
      tags: [Team administration]
      summary: Replace an organization custom grant set
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json: { schema: { $ref: '#/components/schemas/CustomGrantSetRequest' } },
            },
        }
      responses: { '200': { description: Custom grant set updated } }
    delete:
      tags: [Team administration]
      summary: Delete an unused organization custom grant set
      security: [{ bearerAuth: [] }]
      responses:
        {
          '204': { description: Custom grant set deleted },
          '409': { description: Grant set is assigned or is used by a pending invite },
        }
  /billing:
    get:
      tags: [Billing]
      summary: Read verified subscription and location-capacity status
      description: Requires Owner-only billing:manage and reports reconciled state only.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Billing overview,
            content:
              { application/json: { schema: { $ref: '#/components/schemas/BillingResponse' } } },
          }
        '403': { $ref: '#/components/responses/PermissionDenied' }
  /billing/checkout:
    post:
      tags: [Billing]
      summary: Create a Stripe-hosted subscription Checkout session
      description: Its browser return is informational; only a signed webhook activates paid writes.
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          {
            description: Hosted Checkout session,
            content:
              {
                application/json:
                  { schema: { $ref: '#/components/schemas/CheckoutSessionResponse' } },
              },
          }
        '503': { description: Billing configuration is unavailable }
  /billing/capacity-checkout:
    post:
      tags: [Billing]
      summary: Create a hosted Checkout session for additional location capacity
      description: This never inserts the blocked location; a signed reconciliation must create the next entitlement first.
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: '#/components/schemas/CapacityCheckoutRequest' } },
            },
        }
      responses:
        '200':
          {
            description: Hosted Checkout session or current reconciliation state,
            content:
              {
                application/json:
                  { schema: { $ref: '#/components/schemas/CheckoutSessionResponse' } },
              },
          }
        '403': { $ref: '#/components/responses/PermissionDenied' }
  /billing/portal:
    post:
      tags: [Billing]
      summary: Create a Stripe Customer Portal session
      security: [{ bearerAuth: [] }]
      requestBody:
        {
          required: true,
          content:
            { application/json: { schema: { $ref: '#/components/schemas/BillingPortalRequest' } } },
        }
      responses:
        '200': { description: Hosted Customer Portal URL }
        '409': { description: A Stripe customer does not exist yet }
  /webhooks/stripe:
    post:
      tags: [Stripe webhooks]
      summary: Receive a raw-body Stripe webhook
      description: Public only to Stripe. The v1 signature is verified against the unparsed body and duplicate external event IDs are terminally idempotent.
      security: []
      parameters: [{ name: Stripe-Signature, in: header, required: true, schema: { type: string } }]
      requestBody:
        {
          required: true,
          content: { application/json: { schema: { type: object, additionalProperties: true } } },
        }
      responses:
        '200': { description: Received or duplicate event }
        '400': { description: Invalid, missing, or stale Stripe signature }
  /health:
    get:
      tags: [Current user]
      summary: This endpoint is served at /health outside the versioned API prefix
      description: The health endpoint is intentionally documented for discoverability; use `GET /health`.
      servers:
        - url: http://localhost:3001
          description: Local development root
      security: []
      responses:
        '200': { description: Service is responsive }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    refreshCookie: { type: apiKey, in: cookie, name: stock_refresh }
  headers:
    RefreshCookie:
      description: HttpOnly, SameSite=Strict refresh cookie for web clients; Secure outside local development.
      schema: { type: string }
  schemas:
    BillingResponse:
      type: object
      properties:
        data:
          type: object
          required: [status, planName, locations]
          properties:
            status: { type: string, enum: [trialing, active, past_due, canceled, expired_readonly] }
            trialEnd: { type: [string, 'null'], format: date-time }
            currentPeriodEnd: { type: [string, 'null'], format: date-time }
            customerId: { type: [string, 'null'] }
            planName: { type: string }
            priceDescription: { type: string }
            locationAddonPriceDescription: { type: string }
            locations:
              {
                type: object,
                required: [used, capacity],
                properties: { used: { type: integer }, capacity: { type: integer } },
              }
    CapacityCheckoutRequest:
      type: object
      additionalProperties: false
      required: [idempotencyKey]
      properties:
        idempotencyKey: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1, maximum: 100, default: 1 }
    CheckoutSessionResponse:
      type: object
      properties:
        data:
          type: object
          required: [checkoutUrl, status]
          properties:
            checkoutUrl: { type: [string, 'null'], format: uri }
            status: { type: string, enum: [awaiting_reconciliation, completed] }
            intentId: { type: string, format: uuid }
    BillingPortalRequest:
      type: object
      additionalProperties: false
      required: [returnUrl]
      properties: { returnUrl: { type: string, format: uri, maxLength: 2000 } }
    DashboardResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            locations: { type: array, items: { type: object, additionalProperties: true } }
            lowStock:
              {
                type: array,
                items:
                  {
                    type: object,
                    required: [locationId, locationName, itemId, itemName, quantity, threshold],
                    additionalProperties: true,
                  },
              }
    LossByReasonResponse:
      type: object
      properties:
        {
          data:
            {
              type: array,
              items:
                {
                  type: object,
                  required: [reasonCode, eventCount, quantityLost],
                  additionalProperties: true,
                },
            },
        }
    ActivityResponse:
      type: object
      properties:
        {
          data: { type: array, items: { type: object, additionalProperties: true } },
          meta: { type: object },
        }
    MembershipList:
      type: object
      properties:
        {
          data: { type: array, items: { type: object, additionalProperties: true } },
          meta: { type: object },
        }
    MembershipUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        grantSetId: { type: string, format: uuid }
        status: { type: string, enum: [active, revoked] }
    InvitationRequest:
      type: object
      additionalProperties: false
      required: [email, grantSetId]
      properties:
        email: { type: string, format: email }
        name: { type: [string, 'null'] }
        grantSetId: { type: string, format: uuid }
    InvitationAcceptanceRequest:
      type: object
      additionalProperties: false
      required: [token, password, name]
      properties:
        token: { type: string, minLength: 32, writeOnly: true }
        password: { type: string, minLength: 8, format: password, writeOnly: true }
        name: { type: string, minLength: 1 }
        clientType: { type: string, enum: [web, mobile], default: web }
    CustomGrantSetRequest:
      type: object
      additionalProperties: false
      required: [name, permissions]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        permissions:
          { type: array, minItems: 1, items: { type: string, pattern: '^[a-z_]+:[a-z_]+$' } }
    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, name]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 8, maxLength: 256, format: password }
        name: { type: string, minLength: 1, maxLength: 160 }
        clientType: { type: string, enum: [web, mobile], default: web }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 8, maxLength: 256, format: password }
        clientType: { type: string, enum: [web, mobile], default: web }
    RefreshRequest:
      type: object
      additionalProperties: false
      properties:
        refreshToken: { type: string, minLength: 32, maxLength: 512, writeOnly: true }
    User:
      type: object
      required: [id, email, name, status]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        status: { type: string, enum: [active, disabled] }
    Session:
      type: object
      required: [accessToken, expiresIn, activeOrganizationId]
      properties:
        accessToken: { type: string, readOnly: true }
        expiresIn: { type: integer, example: 900 }
        activeOrganizationId: { type: [string, 'null'], format: uuid }
        refreshToken: { type: string, readOnly: true, description: Mobile only. }
    AuthResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, session]
          properties:
            user: { $ref: '#/components/schemas/User' }
            session: { $ref: '#/components/schemas/Session' }
    RefreshResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [session]
          properties: { session: { $ref: '#/components/schemas/Session' } }
    MeResponse:
      type: object
      required: [data]
      properties:
        data:
          allOf:
            - { $ref: '#/components/schemas/User' }
            - type: object
              required: [activeOrganizationId, memberships]
              properties:
                activeOrganizationId: { type: [string, 'null'], format: uuid }
                memberships: { type: array, items: { $ref: '#/components/schemas/Membership' } }
    Membership:
      type: object
      required:
        [
          organizationId,
          organizationName,
          organizationStatus,
          membershipId,
          grantSetName,
          permissions,
        ]
      properties:
        organizationId: { type: string, format: uuid }
        organizationName: { type: string }
        organizationStatus: { type: string, enum: [active, pending_deletion] }
        membershipId: { type: string, format: uuid }
        grantSetName: { type: string }
        permissions: { type: array, items: { type: string, pattern: '^[a-z_]+:[a-z_]+$' } }
    SelectOrganizationRequest:
      type: object
      additionalProperties: false
      required: [organizationId]
      properties: { organizationId: { type: string, format: uuid } }
    SelectOrganizationResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [activeOrganizationId, accessToken, expiresIn]
          properties:
            activeOrganizationId: { type: string, format: uuid }
            accessToken: { type: string }
            expiresIn: { type: integer, example: 900 }
    OrganizationResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, name, status]
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
            status: { type: string, enum: [active, pending_deletion] }
    CreateOrganizationRequest:
      type: object
      additionalProperties: false
