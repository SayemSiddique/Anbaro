        lastEventId: { type: [string, 'null'], format: uuid }
        lastUpdatedAt: { type: [string, 'null'], format: date-time }
        stockCondition: { type: [string, 'null'], enum: [in_stock, low_stock, out_of_stock, null] }
    ItemRequest:
      type: object
      additionalProperties: false
      required: [categoryId, name, unit]
      properties:
        categoryId: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 160 }
        unit: { type: string, minLength: 1, maxLength: 32 }
        barcodeIdentifier: { type: [string, 'null'], minLength: 1, maxLength: 255 }
    ItemUpdateRequest:
      type: object
      additionalProperties: false
