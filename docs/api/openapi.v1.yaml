      properties:
        id: { type: string, format: uuid }
        rowNumber: { type: integer }
        name: { type: [string, 'null'] }
        unit: { type: [string, 'null'] }
        category: { type: [string, 'null'] }
        barcodeIdentifier: { type: [string, 'null'] }
        location: { type: [string, 'null'] }
        quantityDelta: { type: [string, 'null'] }
        status: { type: string, enum: [valid, error, created, updated, skipped] }
        operation: { type: [string, 'null'], enum: [create, update, null] }
        errors: { type: array, items: { type: string } }
        warnings: { type: array, items: { type: string } }
    ImportBatchResponse:
      type: object
